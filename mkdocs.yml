site_name: kmeanssa-ng
site_description: K-means clustering on quantum graphs and metric spaces using simulated annealing
site_author: Nicolas Klutchnikoff
site_url: https://kmeanssa-ng-b901a8.pages.math.cnrs.fr

repo_name: nicolas.klutchnikoff/kmeanssa-ng
repo_url: https://plmlab.math.cnrs.fr/nicolas.klutchnikoff/kmeanssa-ng

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Basic Concepts: getting-started/concepts.md
  - User Guide:
    - Quantum Graphs: user-guide/quantum-graphs.md
    - Simulated Annealing: user-guide/simulated-annealing.md
    - Graph Generators: user-guide/generators.md
    - Custom Metric Spaces: user-guide/custom-spaces.md
  - Examples:
    - Basic Clustering: examples/basic-clustering.md
    - Advanced Usage: examples/advanced-usage.md
    - Performance Tuning: examples/performance.md
  - API Reference:
    - Core: api/core.md
    - Quantum Graph: api/quantum-graph.md
    - Generators: api/generators.md
  - Development:
    - Contributing: development/contributing.md
    - Architecture: development/architecture.md
    - Testing: development/testing.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            show_bases: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/gitlab
      link: https://plmlab.math.cnrs.fr/nicolas.klutchnikoff/kmeanssa-ng