# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Install all dev dependencies, including the 'docs' group
      - pdm install -G docs --no-default
      # Generate API documentation from docstrings
      - pdm run quartodoc build
    post_build:
      # Main build command
      - pdm run quarto render docs-src/
      # Copy generated HTML to ReadTheDocs output directory
      - mkdir -p $READTHEDOCS_OUTPUT/html
      - cp -r docs-src/_site/* $READTHEDOCS_OUTPUT/html/

# Install project dependencies using PDM
python:
  install:
    - method: pdm
      path: .