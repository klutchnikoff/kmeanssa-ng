# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      # Install Quarto
      - wget -qO- https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz | tar -xz -C /tmp
    pre_build:
      # Generate API documentation from docstrings
      - /tmp/quarto-1.4.550/bin/quartodoc build --config docs-src/_quarto.yml
    post_build:
      # Render Quarto documentation
      - /tmp/quarto-1.4.550/bin/quarto render docs-src/
      # Copy generated HTML to ReadTheDocs output directory
      - mkdir -p $READTHEDOCS_OUTPUT/html
      - cp -r docs-src/_site/* $READTHEDOCS_OUTPUT/html/

# Install Python dependencies
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

