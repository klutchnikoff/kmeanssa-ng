stages:
  - lint
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

# Use Python 3.11 image
image: python:3.11

before_script:
  - python -m pip install --upgrade pip
  - pip install pdm
  - pdm install --no-lock

# Code quality checks
ruff-check:
  stage: lint
  script:
    - pdm run ruff check src/
  allow_failure: false

ruff-format:
  stage: lint
  script:
    - pdm run ruff format --check src/
  allow_failure: false

# Test and coverage
test-coverage:
  stage: test
  variables:
    NUMBA_DISABLE_JIT: "1"
  script:
    - pdm run pytest --cov=kmeanssa_ng --cov-report=term --cov-report=xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  allow_failure: false

deploy:
  stage: deploy
  script:
    # Trusted publishing (OIDC) is unsupported from self-hosted GitLab, so we
    # authenticate with a PyPI API token stored in the masked, non-protected
    # CI/CD variable PDM_PUBLISH_PASSWORD. The username __token__ is not secret.
    - pdm publish --username __token__
  only:
    - tags