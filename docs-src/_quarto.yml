project:
  type: website
  output-dir: _site # Default Quarto output directory

website:
  title: "kmeanssa-ng"
  description: "K-means clustering on quantum graphs and metric spaces using simulated annealing"
  repo-url: https://plmlab.math.cnrs.fr/nicolas.klutchnikoff/kmeanssa-ng
  repo-actions: [edit, issue]

  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: "Getting Started"
        menu:
          - href: quickstart.qmd
          - href: concepts.qmd
      - text: "User Guide"
        menu:
          - href: quantum-graphs.qmd
          - href: simulated-annealing.qmd
          - href: generators.qmd
          - href: custom-spaces.qmd
      - text: "Examples"
        menu:
          - href: basic-clustering.qmd
          - href: advanced-usage.qmd
          - href: performance.qmd
      - text: "API"
        menu:
          - href: api/index.qmd
            text: "Overview"
          - href: api/core.qmd
          - href: api/quantum_graph.qmd
          - href: api/generators.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    code-copy: true
    code-overflow: scroll

execute:
  freeze: auto
  cache: false

# Quartodoc configuration
metadata:
  quartodoc:
    package: kmeanssa_ng
    sections:
      - title: "Core"
        desc: "Core functionalities for clustering."
        path: api/core
        members:
          - kmeanssa_ng.core.simulated_annealing.SimulatedAnnealing
          - kmeanssa_ng.core.abstract.MetricSpace
          - kmeanssa_ng.core.abstract.Point
          - kmeanssa_ng.core.abstract.Center
      - title: "Quantum Graph"
        desc: "Quantum graph implementation."
        path: api/quantum_graph
        members:
          - kmeanssa_ng.quantum_graph.space.QuantumGraph
          - kmeanssa_ng.quantum_graph.point.QuantumPoint
          - kmeanssa_ng.quantum_graph.center.QuantumCenter
      - title: "Generators"
        desc: "Graph and data generators."
        path: api/generators
        members:
          - kmeanssa_ng.quantum_graph.generators.generate_sbm
          - kmeanssa_ng.quantum_graph.generators.generate_lfr